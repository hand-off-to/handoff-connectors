key: github-mcp
family: mcp
version: 1
name: GitHub MCP
type: mcp_stdio_container
status: active
definition:
  runtime: handoff-mcp-runtime
  command: docker
  args:
    - run
    - "-i"
    - "--rm"
    - "-e"
    - GITHUB_PERSONAL_ACCESS_TOKEN
    - "-e"
    - GITHUB_TOOLSETS
    - "ghcr.io/github/github-mcp-server"
  doc_url: https://github.com/github/github-mcp-server
  env_names:
    - GITHUB_PERSONAL_ACCESS_TOKEN
  credential:
    label: GitHub personal access token
    description: A personal access token with repo and read:org scopes. Create one at github.com/settings/tokens.
    required: true
  inputs:
    - name: github_org
      label: Organization
      description: The GitHub organization this connector is scoped to. The assistant treats unqualified repos, issues, and pull requests as belonging to it.
      required: true
      default: ""
    - name: GITHUB_TOOLSETS
      label: Toolsets
      description: Which GitHub capabilities to enable, comma-separated. Leave the default unless you need to narrow scope.
      required: false
      default: "context,repos,issues,pull_requests,users"
      env: true
  instruction_template: >-
    This workspace is scoped to the {{github_org}} GitHub organization. Treat
    "my", "our", and any unqualified repositories, issues, or pull requests as
    belonging to {{github_org}}. Always pass {{github_org}} as the owner/org
    argument, and list repositories by searching org:{{github_org}}. Only use the
    authenticated user's personal account when the user explicitly asks for it.
